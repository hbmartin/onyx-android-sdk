name: Build recovered SDK

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  ANDROID_NDK_VERSION: 28.2.13676358

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out recovered source
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android platform and NDK
        run: sdkmanager "platforms;android-35" "ndk;${ANDROID_NDK_VERSION}"

      - name: Install host verification tools
        run: sudo apt-get update && sudo apt-get install --yes ripgrep

      - name: Set up pinned Rust toolchain
        uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: clippy,rustfmt
          targets: armv7-linux-androideabi,aarch64-linux-android,i686-linux-android,x86_64-linux-android

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: onyxsdk-pen/native -> target

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build, test, and audit recovery
        run: ./gradlew --no-daemon clean :check assembleRecovered

      - name: Upload source-native artifacts and reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: onyxsdk-recovered-complete
          if-no-files-found: error
          path: |
            onyxsdk-*/build/outputs/aar/*.aar
            onyxsdk-*/build/libs/*.jar
            recovery-tests/build/reports/tests/

  fuzz-touch-reader:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RUSTUP_TOOLCHAIN: nightly-2026-07-02

    steps:
      - name: Check out recovered source
        uses: actions/checkout@v7

      - name: Set up pinned nightly Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-07-02

      - name: Cache Rust fuzz dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: touch-reader-fuzz
          workspaces: onyxsdk-pen/native -> target

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked --version 0.13.2

      - name: Fuzz touch-reader state transitions
        working-directory: onyxsdk-pen/native/onyx-pen-touch-reader
        run: cargo +nightly-2026-07-02 fuzz run pen_manager -- -runs=10000

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-and-test
      - fuzz-touch-reader
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download recovered SDK artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: onyxsdk-recovered-complete
          path: release-artifacts

      - name: Publish AARs to GitHub Releases
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          working_directory: release-artifacts
          files: onyxsdk-*/build/outputs/aar/*.aar
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true
