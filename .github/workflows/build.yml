name: Build recovered SDK

on:
  push:
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  ANDROID_NDK_VERSION: 28.2.13676358

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out recovered source
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android platform and NDK
        run: sdkmanager "platforms;android-35" "ndk;${ANDROID_NDK_VERSION}"

      - name: Install host verification tools
        run: sudo apt-get update && sudo apt-get install --yes ripgrep

      - name: Set up pinned Rust toolchain
        # Keep the action ref separate from the compiler version: Dependabot treats
        # refs in `uses` as action releases, not as Rust toolchain versions.
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.1
          components: clippy,rustfmt
          targets: armv7-linux-androideabi,aarch64-linux-android,i686-linux-android,x86_64-linux-android

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: onyxsdk-pen/native -> target

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run typed Detekt analysis
        run: ./gradlew --no-daemon clean detektTypeCheck

      - name: Build, test, and audit recovery
        run: ./gradlew --no-daemon :check assembleRecovered stageGithubRelease

      - name: Build signed Maven Central bundle
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          MAVEN_SIGNING_KEY: ${{ secrets.MAVEN_SIGNING_KEY }}
          MAVEN_SIGNING_PASSWORD: ${{ secrets.MAVEN_SIGNING_PASSWORD }}
        # Signing material is configuration-time input to Gradle's built-in
        # signing plugin, so do not persist this invocation in configuration cache.
        run: ./gradlew --no-daemon --no-configuration-cache verifyCentralBundle

      - name: Upload source-native artifacts and reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: onyxsdk-recovered-complete
          if-no-files-found: error
          path: |
            build/distributions/github/
            build/distributions/central/
            recovery-tests/build/reports/tests/
            **/build/reports/detekt/

  fuzz-touch-reader:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RUSTUP_TOOLCHAIN: nightly-2026-07-02

    steps:
      - name: Check out recovered source
        uses: actions/checkout@v7

      - name: Set up pinned nightly Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-07-02

      - name: Cache Rust fuzz dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: touch-reader-fuzz
          workspaces: onyxsdk-pen/native -> target

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked --version 0.13.2

      - name: Fuzz touch-reader state transitions
        working-directory: onyxsdk-pen/native/onyx-pen-touch-reader
        run: cargo +nightly-2026-07-02 fuzz run pen_manager -- -runs=10000

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-and-test
      - fuzz-touch-reader
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write

    steps:
      - name: Check out release tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Download recovered SDK artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: onyxsdk-recovered-complete
          path: release-artifacts

      - name: Publish new coordinates to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: >-
          python3 scripts/publish_central.py
          --root .
          --bundle release-artifacts/build/distributions/central/onyx-android-sdk-central-bundle.zip

      - name: Publish AARs to GitHub Releases
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          working_directory: release-artifacts
          files: |
            build/distributions/github/*
            build/distributions/central/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true
